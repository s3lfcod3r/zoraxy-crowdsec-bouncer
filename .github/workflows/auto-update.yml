name: Auto-Update Versions

on:
  schedule:
    # Alle 12 Stunden (00:00 und 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Aktuelle Versionen aus Dockerfile lesen
        id: current
        run: |
          ZORAXY=$(grep '^ARG ZORAXY_VERSION=' Dockerfile | head -1 | cut -d'=' -f2)
          PLUGIN=$(grep '^ARG PLUGIN_VERSION=' Dockerfile | head -1 | cut -d'=' -f2)
          echo "zoraxy=$ZORAXY" >> $GITHUB_OUTPUT
          echo "plugin=$PLUGIN" >> $GITHUB_OUTPUT
          echo "Aktuell – Zoraxy: $ZORAXY, Plugin: $PLUGIN"

      - name: Neueste Zoraxy-Version holen (tobychui/zoraxy)
        id: zoraxy_latest
        run: |
          TAG=$(curl -sf https://api.github.com/repos/tobychui/zoraxy/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Zoraxy-Release konnte nicht abgerufen werden"
            exit 1
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Neueste Zoraxy: $TAG"

      - name: Prüfen ob Zoraxy-Docker-Tag existiert
        id: zoraxy_docker
        run: |
          TAG="${{ steps.zoraxy_latest.outputs.version }}"
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/zoraxydocker/zoraxy/tags/${TAG}")
          if [ "$HTTP" = "200" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Docker-Tag vorhanden: zoraxydocker/zoraxy:${TAG}"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::warning::zoraxydocker/zoraxy:${TAG} noch nicht verfügbar (HTTP ${HTTP}) – Zoraxy-Update übersprungen"
          fi

      - name: Neueste Plugin-Version holen (AnthonyMichaelTDM/zoraxy_crowdsec_bouncer)
        id: plugin_latest
        run: |
          TAG=$(curl -sf https://api.github.com/repos/AnthonyMichaelTDM/zoraxy_crowdsec_bouncer/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Plugin-Release konnte nicht abgerufen werden"
            exit 1
          fi
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Neuestes Plugin: $TAG"

      - name: Prüfen ob Update nötig ist
        id: needs_update
        run: |
          UPDATE=false
          NEW_ZORAXY="${{ steps.current.outputs.zoraxy }}"
          NEW_PLUGIN="${{ steps.current.outputs.plugin }}"

          if [ "${{ steps.zoraxy_docker.outputs.available }}" = "true" ] && \
             [ "${{ steps.current.outputs.zoraxy }}" != "${{ steps.zoraxy_latest.outputs.version }}" ]; then
            echo "Zoraxy: ${{ steps.current.outputs.zoraxy }} → ${{ steps.zoraxy_latest.outputs.version }}"
            NEW_ZORAXY="${{ steps.zoraxy_latest.outputs.version }}"
            UPDATE=true
          fi

          if [ "${{ steps.current.outputs.plugin }}" != "${{ steps.plugin_latest.outputs.version }}" ]; then
            echo "Plugin: ${{ steps.current.outputs.plugin }} → ${{ steps.plugin_latest.outputs.version }}"
            NEW_PLUGIN="${{ steps.plugin_latest.outputs.version }}"
            UPDATE=true
          fi

          echo "update=$UPDATE" >> $GITHUB_OUTPUT
          echo "zoraxy=$NEW_ZORAXY" >> $GITHUB_OUTPUT
          echo "plugin=$NEW_PLUGIN" >> $GITHUB_OUTPUT

      - name: Dockerfile aktualisieren
        if: steps.needs_update.outputs.update == 'true'
        run: |
          sed -i "s/^ARG ZORAXY_VERSION=.*/ARG ZORAXY_VERSION=${{ steps.needs_update.outputs.zoraxy }}/" Dockerfile
          sed -i "s/^ARG PLUGIN_VERSION=.*/ARG PLUGIN_VERSION=${{ steps.needs_update.outputs.plugin }}/" Dockerfile
          echo "--- Dockerfile ---"
          grep '^ARG ' Dockerfile

      - name: Änderung committen und pushen (löst Docker-Build aus)
        if: steps.needs_update.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Auto-update: Zoraxy ${{ steps.current.outputs.zoraxy }} -> ${{ steps.needs_update.outputs.zoraxy }}, Plugin ${{ steps.current.outputs.plugin }} -> ${{ steps.needs_update.outputs.plugin }}"
          git push

      - name: Docker-Build starten
        if: steps.needs_update.outputs.update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker-build.yml --repo "${{ github.repository }}"
          echo "Build and Push Docker Image wurde gestartet."

      - name: Kein Update nötig
        if: steps.needs_update.outputs.update != 'true'
        run: |
          echo "Alles aktuell – kein Commit, kein Image-Build."
          echo "Zoraxy: ${{ steps.current.outputs.zoraxy }}"
          echo "Plugin: ${{ steps.current.outputs.plugin }}"
